name: Manual Blog Post

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Channel name (ambil video terakhir dari repo ini)
        required: true
        type: choice
        options:
          - konten-1
          - konten-2
          - konten3
          - konten4
          - konten5
          - konten6
          - rak_anime
      topic:
        description: Topik (opsional, kosongkan untuk pakai dari state.json)
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Fetch & generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          CH=${{ inputs.channel }}
          TS=$(date -u +"%Y%m%d_%H%M%S")
          STATE_URL="https://raw.githubusercontent.com/Deady456/${CH}/main/state.json"
          JSON=$(curl -sSf "$STATE_URL" 2>/dev/null | jq -c '{video_id:(.published[-1].video_id//""), title:(.published[-1].title//""), topic:(.published[-1].topic//""), channel:"'${CH}'", ts:"'${TS}'"}')
          if [ -z "$JSON" ] || [ "$JSON" = "null" ]; then
            echo "No state.json found or empty — fallback to manual input"
            JSON=$(jq -cn --arg ch "$CH" --arg ts "$TS" '{video_id:"", title:"Manual Post", topic:"'${{ inputs.topic }}'", channel:$ch, ts:$ts}')
          fi
          TOPIC_OVERRIDE="${{ inputs.topic }}"
          if [ -n "$TOPIC_OVERRIDE" ]; then
            JSON=$(echo "$JSON" | jq --arg t "$TOPIC_OVERRIDE" '.topic = $t')
          fi
          echo "$JSON" | python add_post.py
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "manual: post from ${{ inputs.channel }}"
            git push
          fi
